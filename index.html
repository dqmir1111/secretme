<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Voice — анонимный разговор</title>
  
  <!-- Шрифты Playerok-стиля: Inter, без засечек -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f5f7fb;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      color: #1c1c28;
    }

    /* Основная карточка — как в Playerok: светлая, скруглённая, тень */
    .card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.07), 0 8px 18px -6px rgba(0, 0, 0, 0.05);
      padding: 28px 24px;
      transition: all 0.2s ease;
      border: 1px solid rgba(0, 0, 0, 0.02);
    }

    /* Заголовок с иконкой */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(145deg, #2563eb, #1d4ed8);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 12px -4px rgba(37, 99, 235, 0.2);
    }

    .logo-icon svg {
      width: 28px;
      height: 28px;
      color: white;
    }

    .title {
      font-weight: 700;
      font-size: 1.9rem;
      letter-spacing: -0.03em;
      color: #0f1825;
    }

    .title span {
      font-weight: 400;
      color: #5b6c85;
    }

    /* Блок визуализатора */
    .visualizer-wrap {
      background: #f8fafd;
      border-radius: 24px;
      padding: 14px 12px;
      margin-bottom: 20px;
      border: 1px solid #eef2f6;
    }

    canvas {
      display: block;
      width: 100%;
      height: 54px;
      border-radius: 20px;
    }

    /* Информация о разговоре */
    .call-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 0 4px;
    }

    .partner {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      background: #e6edf8;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2563eb;
      font-weight: 600;
      font-size: 1.1rem;
    }

    .partner-name {
      font-weight: 600;
      font-size: 1.2rem;
      color: #1e293b;
    }

    .partner-status {
      font-size: 0.8rem;
      color: #5f7d9c;
      margin-top: 2px;
    }

    .timer {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      font-size: 1.3rem;
      background: #f1f5f9;
      padding: 6px 14px;
      border-radius: 40px;
      color: #0b1e33;
      letter-spacing: 0.5px;
    }

    /* Статусная строка */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .indicator {
      width: 8px;
      height: 8px;
      border-radius: 8px;
      background: #94a3b8;
      transition: all 0.2s;
    }

    .indicator.active {
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
    }

    .indicator.searching {
      background: #eab308;
      box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.15);
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    #status {
      font-weight: 500;
      color: #415a77;
      font-size: 0.95rem;
    }

    /* Группа кнопок */
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .btn {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      padding: 14px 22px;
      border-radius: 60px;
      border: none;
      background: #ffffff;
      color: #1e293b;
      border: 1px solid #dde3ea;
      box-shadow: 0 4px 8px -2px rgba(0, 0, 0, 0.03);
      cursor: pointer;
      transition: all 0.2s;
      flex: 1 0 130px;
      backdrop-filter: blur(4px);
    }

    .btn-primary {
      background: #1a4cff;
      border: 1px solid #1a4cff;
      color: white;
      box-shadow: 0 10px 18px -8px #1a4cff66;
    }

    .btn-primary:hover {
      background: #1540db;
      transform: translateY(-2px);
      box-shadow: 0 14px 22px -10px #1a4cff;
    }

    .btn-outline {
      background: white;
      border: 1px solid #d0dae8;
    }

    .btn-outline:hover {
      background: #f8faff;
      border-color: #a0bbd8;
      transform: translateY(-1px);
    }

    .btn-danger {
      background: #fff1f0;
      border-color: #ffcdc7;
      color: #c01b1b;
    }

    .btn-danger:hover {
      background: #ffe6e3;
      border-color: #ffaaa0;
    }

    .btn:disabled {
      opacity: 0.45;
      pointer-events: none;
      filter: grayscale(0.3);
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: none;
    }

    /* Скрытое аудио */
    #remoteAudio {
      display: none;
    }

    /* Адаптив */
    @media (max-width: 480px) {
      .card { padding: 20px 16px; border-radius: 28px; }
      .title { font-size: 1.7rem; }
      .btn { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="logo-icon">
      <!-- иконка микрофона -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" x2="12" y1="19" y2="22"/>
      </svg>
    </div>
    <div class="title">voice<span>box</span></div>
  </div>

  <!-- Визуализатор -->
  <div class="visualizer-wrap">
    <canvas id="audioVisualizer" width="360" height="54"></canvas>
  </div>

  <!-- Информация о собеседнике и таймер -->
  <div class="call-info">
    <div class="partner">
      <div class="avatar" id="partnerAvatar">N</div>
      <div>
        <div class="partner-name" id="partnerName">Nekto</div>
        <div class="partner-status" id="partnerStatus">офлайн</div>
      </div>
    </div>
    <div class="timer" id="callTimer">00:00</div>
  </div>

  <!-- Статус -->
  <div class="status-row">
    <span class="indicator" id="statusDot"></span>
    <span id="status">подключение...</span>
  </div>

  <!-- Кнопки -->
  <div class="actions">
    <button class="btn btn-primary" id="startBtn" disabled>🔍 Найти</button>
    <button class="btn btn-outline" id="nextBtn" disabled style="display:none;">Следующий</button>
    <button class="btn btn-danger" id="stopBtn" disabled>Завершить</button>
  </div>
</div>

<audio id="remoteAudio" autoplay></audio>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  // Ваша конфигурация
const firebaseConfig = {
  apiKey: "AIzaSyDeUzPDzlNOOjltElDOlPkYTwJVTiki_6s",
  authDomain: "secretme1.firebaseapp.com",
  projectId: "secretme1",
  storageBucket: "secretme1.firebasestorage.app",
  messagingSenderId: "8350375438",
  appId: "1:8350375438:web:6b1af092ebcd2023bf265f",
  measurementId: "G-FTJ1K62JSE"
};

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  // DOM элементы
  const startBtn = document.getElementById('startBtn');
  const nextBtn = document.getElementById('nextBtn');
  const stopBtn = document.getElementById('stopBtn');
  const statusDiv = document.getElementById('status');
  const statusDot = document.getElementById('statusDot');
  const remoteAudio = document.getElementById('remoteAudio');
  const canvas = document.getElementById('audioVisualizer');
  const canvasCtx = canvas.getContext('2d');
  const partnerNameEl = document.getElementById('partnerName');
  const partnerStatusEl = document.getElementById('partnerStatus');
  const partnerAvatarEl = document.getElementById('partnerAvatar');
  const timerEl = document.getElementById('callTimer');

  // Глобальное состояние
  let localUid = null;
  let localStream = null;
  let peerConnection = null;
  let currentRoomId = null;
  let isInitiator = false;
  let waitingRef = null;
  let roomRef = null;
  let unsubscribeQueue = null;   // отписка от очереди
  let unsubscribeRoom = null;    // отписка от комнаты
  
  // Таймер разговора
  let callStartTime = null;
  let timerInterval = null;

  // Аудио визуализация
  let audioContext = null;
  let analyser = null;
  let source = null;
  let animationFrame = null;

  const servers = {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' }
    ]
  };

  // ---------- Визуализатор ----------
  function initVisualizer(stream) {
    if (!stream) return;
    stopVisualizer();
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 256;
    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);
    source = audioContext.createMediaStreamSource(stream);
    source.connect(analyser);
    
    function draw() {
      if (!analyser) return;
      animationFrame = requestAnimationFrame(draw);
      analyser.getByteFrequencyData(dataArray);
      canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
      
      const gradient = canvasCtx.createLinearGradient(0, 0, canvas.width, 0);
      gradient.addColorStop(0, '#2563eb');
      gradient.addColorStop(0.5, '#7c3aed');
      gradient.addColorStop(1, '#0ea5e9');
      
      canvasCtx.lineWidth = 2.8;
      canvasCtx.strokeStyle = gradient;
      canvasCtx.shadowBlur = 8;
      canvasCtx.shadowColor = '#3b82f640';
      
      const sliceWidth = canvas.width / bufferLength;
      let x = 0;
      canvasCtx.beginPath();
      for (let i = 0; i < bufferLength; i++) {
        const v = dataArray[i] / 128.0;
        const y = (v * canvas.height) / 2;
        if (i === 0) canvasCtx.moveTo(x, y);
        else canvasCtx.lineTo(x, y);
        x += sliceWidth;
      }
      canvasCtx.stroke();
      
      canvasCtx.beginPath();
      x = 0;
      for (let i = 0; i < bufferLength; i++) {
        const v = dataArray[i] / 128.0;
        const y = canvas.height - (v * canvas.height) / 2;
        if (i === 0) canvasCtx.moveTo(x, y);
        else canvasCtx.lineTo(x, y);
        x += sliceWidth;
      }
      canvasCtx.strokeStyle = '#8b5cf6';
      canvasCtx.stroke();
      canvasCtx.shadowBlur = 0;
    }
    draw();
  }

  function stopVisualizer() {
    if (animationFrame) cancelAnimationFrame(animationFrame);
    if (audioContext) audioContext.close();
    audioContext = analyser = source = null;
    canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
  }

  // ---------- Обновление UI ----------
  function setStatus(text, type = 'idle') {
    statusDiv.textContent = text;
    statusDot.className = 'indicator';
    if (type === 'connected') statusDot.classList.add('active');
    if (type === 'searching') statusDot.classList.add('searching');
  }

  function updatePartnerInfo(connected = false, customName = 'Nekto') {
    if (connected) {
      partnerNameEl.textContent = customName;
      partnerStatusEl.textContent = 'в сети • разговор';
      partnerAvatarEl.textContent = customName.charAt(0).toUpperCase();
    } else {
      partnerNameEl.textContent = 'Nekto';
      partnerStatusEl.textContent = 'офлайн';
      partnerAvatarEl.textContent = 'N';
    }
  }

  // Таймер
  function startTimer() {
    stopTimer();
    callStartTime = Date.now();
    timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
      const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
      const secs = (elapsed % 60).toString().padStart(2, '0');
      timerEl.textContent = `${mins}:${secs}`;
    }, 500);
  }

  function stopTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = null;
    timerEl.textContent = '00:00';
  }

  // ---------- Аутентификация ----------
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      localUid = user.uid;
      setStatus('готов к поиску', 'idle');
      startBtn.disabled = false;
      stopBtn.disabled = false;
      onDisconnect(ref(db, `queues/waiting/${localUid}`)).remove();
    } else {
      try { await signInAnonymously(auth); } 
      catch (e) { setStatus('ошибка входа', 'idle'); }
    }
  });

  // ---------- Медиа ----------
  async function getLocalStream() {
    if (localStream) return localStream;
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      return localStream;
    } catch (e) {
      setStatus('нет доступа к микрофону', 'idle');
      throw e;
    }
  }

  function createPeerConnection() {
    const pc = new RTCPeerConnection(servers);
    if (localStream) {
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
    }
    pc.ontrack = (e) => {
      if (e.streams?.[0]) {
        remoteAudio.srcObject = e.streams[0];
        initVisualizer(e.streams[0]);
        setStatus('разговор', 'connected');
        updatePartnerInfo(true);
        startTimer();
      }
    };
    pc.onicecandidate = (e) => {
      if (e.candidate && roomRef) {
        set(ref(db, `rooms/${currentRoomId}/candidates/${localUid}`), e.candidate.toJSON());
      }
    };
    pc.oniceconnectionstatechange = () => {
      if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
        setStatus('соединение прервано', 'idle');
        hangup();
      }
    };
    return pc;
  }

  // ---------- Очистка и завершение ----------
  function hangup() {
    // отписываемся от всех слушателей Firebase
    if (unsubscribeQueue) { unsubscribeQueue(); unsubscribeQueue = null; }
    if (unsubscribeRoom) { unsubscribeRoom(); unsubscribeRoom = null; }
    
    if (peerConnection) {
      peerConnection.close();
      peerConnection = null;
    }
    if (roomRef) {
      remove(roomRef);
      roomRef = null;
    }
    currentRoomId = null;
    isInitiator = false;
    remoteAudio.srcObject = null;
    stopVisualizer();
    stopTimer();
    updatePartnerInfo(false);
    
    if (waitingRef) {
      remove(waitingRef);
      waitingRef = null;
    }
    
    startBtn.style.display = 'inline-block';
    nextBtn.style.display = 'none';
    setStatus('разговор завершён', 'idle');
  }

  // ---------- Поиск собеседника (исправленная логика) ----------
  async function startSearch() {
    if (!localUid) return;
    await getLocalStream();
    hangup(); // гарантированно очищаем предыдущие подписки
    
    setStatus('поиск собеседника...', 'searching');
    startBtn.style.display = 'none';
    nextBtn.style.display = 'none';
    
    waitingRef = ref(db, `queues/waiting/${localUid}`);
    await set(waitingRef, true);
    
    const queueRef = ref(db, 'queues/waiting');
    // Сохраняем функцию отписки
    unsubscribeQueue = onValue(queueRef, async (snapshot) => {
      const waiting = snapshot.val() || {};
      const userIds = Object.keys(waiting);
      
      // Проверяем, что мы всё ещё в очереди (waitingRef не null)
      if (!waitingRef) return;
      
      // Ищем другого пользователя
      const otherId = userIds.find(id => id !== localUid);
      if (otherId) {
        // Немедленно отписываемся от очереди, чтобы избежать повторных срабатываний
        if (unsubscribeQueue) {
          unsubscribeQueue();
          unsubscribeQueue = null;
        }
        
        currentRoomId = `${localUid}_${otherId}_${Date.now()}`;
        roomRef = ref(db, `rooms/${currentRoomId}`);
        isInitiator = localUid < otherId;
        
        const roomData = {
          initiator: isInitiator ? localUid : otherId,
          receiver: isInitiator ? otherId : localUid
        };
        
        await set(roomRef, roomData);
        
        // Удаляем обоих из очереди
        await remove(ref(db, `queues/waiting/${localUid}`));
        await remove(ref(db, `queues/waiting/${otherId}`));
        waitingRef = null;
        
        setStatus('собеседник найден, установка связи...', 'searching');
        
        peerConnection = createPeerConnection();
        
        // Подписываемся на комнату
        unsubscribeRoom = onValue(roomRef, async (roomSnapshot) => {
          const data = roomSnapshot.val();
          if (!data || !peerConnection) return;
          const pc = peerConnection;
          
          // ICE candidates
          if (data.candidates) {
            Object.entries(data.candidates).forEach(([uid, cand]) => {
              if (uid !== localUid) pc.addIceCandidate(new RTCIceCandidate(cand)).catch(()=>{});
            });
          }
          
          // Offer / Answer
          if (!isInitiator && data.offer && !pc.currentRemoteDescription) {
            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await update(roomRef, { answer: { type: answer.type, sdp: answer.sdp } });
          }
          if (isInitiator && data.answer && !pc.currentRemoteDescription) {
            await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
          }
        });
        
        if (isInitiator) {
          const offer = await peerConnection.createOffer();
          await peerConnection.setLocalDescription(offer);
          await update(roomRef, { offer: { type: offer.type, sdp: offer.sdp } });
        }
      }
    });
  }

  async function nextPartner() {
    hangup();
    await startSearch();
  }

  function stopEverything() {
    hangup();
    if (localStream) {
      localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }
    stopVisualizer();
    startBtn.style.display = 'inline-block';
    nextBtn.style.display = 'none';
    setStatus('остановлено', 'idle');
  }

  // ---------- Привязка событий ----------
  startBtn.addEventListener('click', async () => {
    try {
      await startSearch();
      nextBtn.style.display = 'inline-block';
    } catch (e) {
      setStatus('ошибка: ' + e.message, 'idle');
      startBtn.style.display = 'inline-block';
    }
  });
  nextBtn.addEventListener('click', nextPartner);
  stopBtn.addEventListener('click', stopEverything);
  
  window.addEventListener('beforeunload', () => {
    if (waitingRef) remove(waitingRef);
    if (roomRef) remove(roomRef);
  });
</script>
</body>
</html>
