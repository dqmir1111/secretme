<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetBoom · маркетплейс</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <!-- Шрифт Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: #f5f7fa; color: #1e1e2a; min-height: 100vh; padding-bottom: 60px; }
        
        /* Анимации */
        @keyframes floatIn { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes fadeScale { 0% { opacity: 0; transform: scale(0.96); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes slideDown { 0% { opacity: 0; transform: translateY(-10px); } 100% { opacity: 1; transform: translateY(0); } }
        
        header {
            background: rgba(255,255,255,0.8); backdrop-filter: blur(12px);
            padding: 16px 40px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02); position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }
        .logo { display: flex; align-items: center; font-size: 42px; font-weight: 900; letter-spacing: -1.5px; cursor: pointer; transition: transform 0.2s; }
        .logo:hover { transform: scale(1.02); }
        .logo .pet { color: #1e1e2a; margin-right: 6px; }
        .logo .boom { background: #1e1e2a; color: #FFD200; padding: 4px 20px; border-radius: 40px; box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        nav { display: flex; gap: 8px; align-items: center; }
        .nav-btn { background: transparent; border: none; padding: 12px 20px; border-radius: 60px; font-weight: 600; font-size: 15px; cursor: pointer; transition: all 0.2s; color: #1e1e2a; }
        .nav-btn:hover { background: #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.05); transform: translateY(-1px); }
        .admin-btn { background: #1e1e2a; color: #FFD200; }
        .admin-btn:hover { background: #2d2d3a; color: #FFD200; }
        .user-badge { display: flex; align-items: center; gap: 10px; background: #fff; padding: 6px 16px; border-radius: 60px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }

        .page { display: none; max-width: 1280px; margin: 30px auto; padding: 0 24px; animation: floatIn 0.4s ease; }
        .page.active { display: block; }
        h2 { font-size: 32px; margin-bottom: 24px; font-weight: 800; letter-spacing: -0.5px; }

        /* Сетка товаров */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }
        .product-card {
            background: #fff; border-radius: 24px; padding: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04); transition: all 0.3s cubic-bezier(0.15,0.75,0.4,1);
            border: 1px solid #ffffff; cursor: pointer;
        }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 24px 36px -12px rgba(0,0,0,0.15); border-color: #FFD20060; }
        .product-img {
            width: 100%; height: 180px; background: #f0f2f5; border-radius: 18px;
            display: flex; align-items: center; justify-content: center; font-size: 56px;
            object-fit: cover; margin-bottom: 14px; transition: 0.2s;
            overflow: hidden;
        }
        .product-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 18px; }
        .product-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
        .price-block { display: flex; align-items: center; gap: 8px; margin: 10px 0; flex-wrap: wrap; }
        .current-price { font-size: 24px; font-weight: 800; color: #1e1e2a; }
        .old-price { font-size: 16px; color: #9a9aa8; text-decoration: line-through; }
        .discount-badge { background: #FFD200; padding: 4px 10px; border-radius: 30px; font-weight: 700; font-size: 13px; }
        .buy-btn {
            background: #FFD200; border: none; padding: 14px; border-radius: 16px; font-weight: 800;
            font-size: 16px; width: 100%; cursor: pointer; margin-top: 8px; transition: 0.2s;
            box-shadow: 0 4px 8px #FFD20040;
        }
        .buy-btn:hover { background: #ffe033; transform: scale(0.98); }

        /* Админ-панель */
        .admin-section { background: #fff; border-radius: 28px; padding: 28px; margin-bottom: 28px; box-shadow: 0 12px 30px -8px rgba(0,0,0,0.04); }
        .add-form { display: grid; gap: 18px; max-width: 600px; }
        .add-form input, .add-form textarea, .add-form select {
            padding: 16px 18px; border: 1.5px solid #eaeaef; border-radius: 20px;
            font-size: 16px; background: #fafafc; outline: none; transition: 0.2s;
        }
        .add-form input:focus, .add-form textarea:focus { border-color: #FFD200; box-shadow: 0 0 0 4px #FFD20020; }
        .btn-submit {
            background: #1e1e2a; color: #fff; border: none; padding: 16px; border-radius: 20px;
            font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s;
        }
        .btn-submit:hover { background: #2d2d3a; transform: scale(0.98); }

        /* Заказы */
        .order-card {
            background: #fff; padding: 22px; border-radius: 24px; margin-bottom: 16px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 6px 14px rgba(0,0,0,0.02); transition: 0.2s;
            animation: slideDown 0.3s;
        }
        .order-card:hover { box-shadow: 0 12px 24px -8px rgba(0,0,0,0.08); }
        .status-badge { padding: 6px 14px; border-radius: 60px; font-weight: 700; font-size: 13px; }
        .status-wait { background: #fff3cd; color: #856404; }
        .status-paid { background: #cfe2ff; color: #084298; }
        .status-done { background: #d1e7dd; color: #0a3622; }
        .status-cancel { background: #f8d7da; color: #b02a37; }
        .order-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .action-btn {
            border: none; padding: 10px 18px; border-radius: 14px; font-weight: 600;
            cursor: pointer; transition: 0.15s; font-size: 14px; background: #f1f3f5;
        }
        .action-btn:hover { filter: brightness(0.96); transform: translateY(-2px); }

        /* Модальные окна */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal {
            background: #fff; padding: 32px; border-radius: 36px; width: 90%; max-width: 520px;
            max-height: 90vh; overflow-y: auto; box-shadow: 0 30px 60px rgba(0,0,0,0.25);
            animation: fadeScale 0.25s;
        }
        .product-detail-images {
            display: flex; gap: 12px; overflow-x: auto; padding: 16px 0;
            scroll-snap-type: x mandatory;
        }
        .product-detail-images img {
            width: 120px; height: 120px; border-radius: 20px; object-fit: cover;
            border: 2px solid #eee; scroll-snap-align: start;
        }
        .close-modal {
            margin-top: 24px; background: none; border: none; color: #7e7e8d;
            font-weight: 600; cursor: pointer; font-size: 16px;
        }
        .close-modal:hover { color: #1e1e2a; }

        /* Чат */
        .chat-box {
            height: 320px; background: #f6f7f9; border-radius: 28px; padding: 18px;
            overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
        }
        .chat-msg { max-width: 80%; padding: 12px 18px; border-radius: 22px; font-size: 15px; }
        .msg-system { background: #ffe9a3; align-self: center; font-size: 13px; border-radius: 30px; }
        .msg-admin { background: #fff; align-self: flex-start; border-bottom-left-radius: 6px; }
        .msg-user { background: #FFD200; align-self: flex-end; border-bottom-right-radius: 6px; }

        /* Табы логина */
        .login-tabs { display: flex; gap: 10px; margin-bottom: 24px; }
        .login-tab {
            flex: 1; padding: 14px; border-radius: 40px; background: #f0f0f5;
            border: none; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .login-tab.active { background: #1e1e2a; color: #FFD200; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="openPage('catalog')">
        <span class="pet">Pet</span><span class="boom">Boom</span>
    </div>
    <nav>
        <button class="nav-btn" onclick="openPage('catalog')">🛍️ Товары</button>
        <button class="nav-btn" onclick="openPage('orders')">📦 Заказы</button>
        <button class="nav-btn admin-btn" id="adminPanelBtn" style="display: none;" onclick="openPage('admin')">⚙️ Админ</button>
        <div id="authArea"></div>
    </nav>
</header>

<!-- СТРАНИЦЫ -->
<main id="page-catalog" class="page active">
    <h2>🛒 Товары</h2>
    <div class="products-grid" id="products-container"></div>
</main>

<main id="page-orders" class="page">
    <h2>🧾 История заказов</h2>
    <div id="userOrdersContainer"></div>
</main>

<main id="page-admin" class="page">
    <h2>🛠️ Администрирование</h2>
    <div class="admin-section">
        <h3 style="margin-bottom: 22px;">➕ Новый товар</h3>
        <div class="add-form">
            <input type="text" id="new-title" placeholder="Название товара">
            <input type="number" id="new-price" placeholder="Цена (₽)">
            <input type="text" id="new-emoji" placeholder="Эмодзи (🐕)">
            <textarea id="new-images" placeholder="URL фото через запятую" rows="2"></textarea>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="discount-value" placeholder="Размер скидки" style="flex:2;">
                <select id="discount-type" style="flex:1; padding: 16px; border-radius: 20px; border:1.5px solid #eaeaef;">
                    <option value="percent">%</option>
                    <option value="fixed">₽</option>
                </select>
            </div>
            <button class="btn-submit" onclick="addProductToFirestore()">Опубликовать</button>
        </div>
    </div>
    <div class="admin-section">
        <h3>📋 Все заказы</h3>
        <div id="adminOrdersContainer"></div>
    </div>
</main>

<!-- Модалка товара -->
<div class="modal-overlay" id="productModal">
    <div class="modal" style="max-width: 600px;">
        <h3 id="modalProductTitle"></h3>
        <div class="product-detail-images" id="modalProductImages"></div>
        <div style="margin: 24px 0;">
            <span id="modalCurrentPrice" style="font-size: 32px; font-weight: 800;"></span>
            <span id="modalOldPrice" style="margin-left: 12px; color: #9a9aa8; text-decoration: line-through; font-size: 20px;"></span>
            <span id="modalDiscountBadge" style="margin-left: 12px; background: #FFD200; padding: 6px 14px; border-radius: 30px;"></span>
        </div>
        <button class="buy-btn" style="font-size: 18px; padding: 16px;" onclick="buyFromModal()">Купить сейчас</button>
        <button class="close-modal" onclick="closeModal('productModal')">Закрыть</button>
    </div>
</div>

<!-- Модалка входа/регистрации -->
<div class="modal-overlay" id="authModal">
    <div class="modal">
        <div class="login-tabs">
            <button class="login-tab active" id="tabLogin" onclick="switchAuthTab('login')">Вход</button>
            <button class="login-tab" id="tabRegister" onclick="switchAuthTab('register')">Регистрация</button>
        </div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <input type="email" id="loginEmail" placeholder="Email" style="width:100%; padding:16px; border-radius:20px; border:1.5px solid #eaeaef; margin-bottom:15px;" required>
            <input type="password" id="loginPassword" placeholder="Пароль" style="width:100%; padding:16px; border-radius:20px; border:1.5px solid #eaeaef; margin-bottom:20px;" required>
            <button type="submit" class="btn-submit" style="width:100%;">Войти</button>
        </form>
        <form id="registerForm" onsubmit="handleRegister(event)" style="display:none;">
            <input type="email" id="regEmail" placeholder="Email" style="width:100%; padding:16px; border-radius:20px; border:1.5px solid #eaeaef; margin-bottom:15px;" required>
            <input type="password" id="regPassword" placeholder="Пароль (мин. 6 символов)" style="width:100%; padding:16px; border-radius:20px; border:1.5px solid #eaeaef; margin-bottom:20px;" required>
            <button type="submit" class="btn-submit" style="width:100%;">Зарегистрироваться</button>
        </form>
        <button class="close-modal" onclick="closeModal('authModal')">Закрыть</button>
    </div>
</div>

<!-- Модалка оплаты -->
<div class="modal-overlay" id="payModal">
    <div class="modal">
        <h3>💳 Оплата</h3>
        <p id="payItemName" style="font-size:18px; font-weight:600; margin:10px 0;"></p>
        <p id="payItemPrice" style="font-size:28px; font-weight:800; margin-bottom:25px;"></p>
        <div class="pay-methods" style="display: flex; flex-direction: column; gap: 14px;">
            <button class="pay-btn" style="background:#fff; border:2px solid #e9e9ed; padding:18px; border-radius:22px; font-weight:700;" onclick="processPayment('card')">💳 Банковская карта</button>
            <button class="pay-btn" style="background:#fff; border:2px solid #e9e9ed; padding:18px; border-radius:22px; font-weight:700;" onclick="processPayment('cash')">💵 Наличные</button>
            <button class="pay-btn" style="background:#fff; border:2px solid #e9e9ed; padding:18px; border-radius:22px; font-weight:700;" onclick="processPayment('crypto')">🪙 Криптовалюта (CryptoBot)</button>
        </div>
        <button class="close-modal" onclick="closeModal('payModal')">Отмена</button>
    </div>
</div>

<!-- Модалка чата -->
<div class="modal-overlay" id="chatModal">
    <div class="modal" style="max-width: 550px;">
        <h3>💬 Чат по заказу <span id="chatOrderIdDisplay"></span></h3>
        <div class="chat-box" id="chatMessagesBox"></div>
        <div style="display:flex; gap:8px; margin-top:15px;">
            <input type="text" id="chatInput" placeholder="Введите сообщение..." style="flex:1; padding:14px; border-radius:30px; border:1px solid #ddd;">
            <button onclick="sendChatMessage()" style="background:#1e1e2a; color:#fff; border:none; padding:0 28px; border-radius:30px; font-weight:700;">➤</button>
        </div>
        <button class="close-modal" onclick="closeModal('chatModal'); stopChatListener();">Закрыть</button>
    </div>
</div>

<script>
    // --- Firebase init ---
    const firebaseConfig = {
        apiKey: "AIzaSyDV767I9_I1bUcGuhjhe8XCUdqHj126pPE",
        authDomain: "petboom12.firebaseapp.com",
        projectId: "petboom12",
        storageBucket: "petboom12.firebasestorage.app",
        messagingSenderId: "127881279305",
        appId: "1:127881279305:web:4cb988924eaa1661478c98"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const CRYPTOBOT_TOKEN = '570588:AAX16HT1H6wz058UkCIiuXIBaqdTrUYjyns';
    const ADMIN_EMAIL = 'dqmjrka@petboom.com';

    let currentUser = null;
    let currentProductForModal = null;
    let currentBuyProduct = null;
    let unsubscribeChat = null;
    let currentChatOrderId = null;

    // --- Auth observer ---
    auth.onAuthStateChanged(user => {
        currentUser = user;
        updateUIForAuth();
        if (user) {
            renderProducts();
            renderUserOrders();
            if (user.email === ADMIN_EMAIL) {
                document.getElementById('adminPanelBtn').style.display = 'inline-block';
            } else {
                document.getElementById('adminPanelBtn').style.display = 'none';
            }
        } else {
            document.getElementById('adminPanelBtn').style.display = 'none';
            document.getElementById('products-container').innerHTML = '<p style="padding:20px;">Войдите, чтобы увидеть товары</p>';
            document.getElementById('userOrdersContainer').innerHTML = '<p>Войдите для просмотра</p>';
        }
        // Если текущая страница админа, а пользователь не админ — перекинуть
        if (document.getElementById('page-admin').classList.contains('active') && (!user || user.email !== ADMIN_EMAIL)) {
            openPage('catalog');
        }
    });

    function updateUIForAuth() {
        const area = document.getElementById('authArea');
        if (currentUser) {
            area.innerHTML = `<div class="user-badge"><span>👤 ${currentUser.email.split('@')[0]}</span><button class="nav-btn" style="padding:6px 12px;" onclick="logout()">Выйти</button></div>`;
        } else {
            area.innerHTML = `<button class="nav-btn" onclick="openAuthModal()">🔐 Войти</button>`;
        }
    }

    function openAuthModal() { document.getElementById('authModal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function logout() { auth.signOut(); openPage('catalog'); }

    function switchAuthTab(type) {
        document.getElementById('loginForm').style.display = type === 'login' ? 'block' : 'none';
        document.getElementById('registerForm').style.display = type === 'register' ? 'block' : 'none';
        document.getElementById('tabLogin').classList.toggle('active', type === 'login');
        document.getElementById('tabRegister').classList.toggle('active', type === 'register');
    }

    async function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;
        try { await auth.signInWithEmailAndPassword(email, pass); closeModal('authModal'); }
        catch(err) { alert('Ошибка входа: ' + err.message); }
    }

    async function handleRegister(e) {
        e.preventDefault();
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPassword').value;
        if (pass.length < 6) { alert('Пароль минимум 6 символов'); return; }
        try { await auth.createUserWithEmailAndPassword(email, pass); closeModal('authModal'); }
        catch(err) { alert('Ошибка регистрации: ' + err.message); }
    }

    // --- Навигация ---
    function openPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + page).classList.add('active');
        if (page === 'catalog' && currentUser) renderProducts();
        if (page === 'orders' && currentUser) renderUserOrders();
        if (page === 'admin' && currentUser && currentUser.email === ADMIN_EMAIL) renderAdminOrders();
    }

    // --- ТОВАРЫ (Firestore) ---
    async function renderProducts() {
        const container = document.getElementById('products-container');
        container.innerHTML = '<p>Загрузка товаров...</p>';
        try {
            const snapshot = await db.collection('products').get();
            container.innerHTML = '';
            if (snapshot.empty) { container.innerHTML = '<p>Товары пока не добавлены</p>'; return; }
            snapshot.forEach(doc => {
                const p = doc.data();
                const price = p.price || 0;
                let discountPrice = price;
                let discountText = '';
                if (p.discount) {
                    if (p.discount.type === 'percent') discountPrice = price * (1 - p.discount.value / 100);
                    else if (p.discount.type === 'fixed') discountPrice = Math.max(0, price - p.discount.value);
                    discountText = p.discount.type === 'percent' ? `-${p.discount.value}%` : `-${p.discount.value}₽`;
                }
                const images = p.images || [];
                const mainImage = images.length > 0 ? images[0] : null;
                
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => openProductModal(doc.id, p);
                
                const imgDiv = document.createElement('div');
                imgDiv.className = 'product-img';
                if (mainImage) {
                    imgDiv.innerHTML = `<img src="${mainImage}" onerror="this.style.display='none'">`;
                } else {
                    imgDiv.innerHTML = `<span style="font-size:64px;">${p.emoji || '📦'}</span>`;
                }
                
                card.appendChild(imgDiv);
                card.innerHTML += `
                    <div class="product-title">${p.title}</div>
                    <div class="price-block">
                        <span class="current-price">${Math.round(discountPrice)} ₽</span>
                        ${discountPrice < price ? `<span class="old-price">${price} ₽</span><span class="discount-badge">${discountText}</span>` : ''}
                    </div>
                    <button class="buy-btn" onclick="event.stopPropagation(); openPayModal('${doc.id}')">Купить</button>
                `;
                container.appendChild(card);
            });
        } catch(e) { console.error(e); container.innerHTML = '<p>Ошибка загрузки</p>'; }
    }

    function openProductModal(productId, productData) {
        currentProductForModal = { id: productId, ...productData };
        document.getElementById('modalProductTitle').innerText = productData.title;
        const imagesDiv = document.getElementById('modalProductImages');
        imagesDiv.innerHTML = '';
        if (productData.images && productData.images.length) {
            productData.images.forEach(url => {
                imagesDiv.innerHTML += `<img src="${url}" onerror="this.style.display='none'">`;
            });
        } else {
            imagesDiv.innerHTML = `<div style="font-size:80px; text-align:center; width:100%;">${productData.emoji || '📦'}</div>`;
        }
        const price = productData.price;
        let discountPrice = price;
        if (productData.discount) {
            discountPrice = productData.discount.type === 'percent' ? price * (1 - productData.discount.value/100) : price - productData.discount.value;
        }
        document.getElementById('modalCurrentPrice').innerText = Math.round(discountPrice) + ' ₽';
        if (discountPrice < price) {
            document.getElementById('modalOldPrice').innerText = price + ' ₽';
            document.getElementById('modalDiscountBadge').innerText = productData.discount.type === 'percent' ? `-${productData.discount.value}%` : `-${productData.discount.value}₽`;
        } else {
            document.getElementById('modalOldPrice').innerText = '';
            document.getElementById('modalDiscountBadge').innerText = '';
        }
        document.getElementById('productModal').style.display = 'flex';
    }

    function buyFromModal() {
        if (currentProductForModal) {
            closeModal('productModal');
            openPayModal(currentProductForModal.id);
        }
    }

    async function addProductToFirestore() {
        if (!currentUser || currentUser.email !== ADMIN_EMAIL) { alert('Нет прав'); return; }
        const title = document.getElementById('new-title').value.trim();
        const price = parseFloat(document.getElementById('new-price').value);
        const emoji = document.getElementById('new-emoji').value.trim();
        const imagesStr = document.getElementById('new-images').value.trim();
        const discountValue = parseFloat(document.getElementById('discount-value').value);
        const discountType = document.getElementById('discount-type').value;

        if (!title || isNaN(price) || price <= 0) { alert('Введите название и корректную цену'); return; }

        const images = imagesStr ? imagesStr.split(',').map(s => s.trim()).filter(s => s) : [];
        const productData = {
            title, price, emoji, images,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        if (!isNaN(discountValue) && discountValue > 0) {
            productData.discount = { type: discountType, value: discountValue };
        }

        try {
            await db.collection('products').add(productData);
            alert('Товар добавлен!');
            ['new-title','new-price','new-emoji','new-images','discount-value'].forEach(id => document.getElementById(id).value = '');
            renderProducts();
        } catch(e) { alert('Ошибка: ' + e.message); }
    }

    // --- ЗАКАЗЫ ---
    function openPayModal(productId) {
        if (!currentUser) { alert('Войдите в аккаунт'); return; }
        db.collection('products').doc(productId).get().then(doc => {
            currentBuyProduct = { id: doc.id, ...doc.data() };
            document.getElementById('payItemName').innerText = currentBuyProduct.title;
            const price = currentBuyProduct.price;
            let finalPrice = price;
            if (currentBuyProduct.discount) {
                finalPrice = currentBuyProduct.discount.type === 'percent' ? price*(1 - currentBuyProduct.discount.value/100) : price - currentBuyProduct.discount.value;
            }
            document.getElementById('payItemPrice').innerText = Math.round(finalPrice) + ' ₽';
            document.getElementById('payModal').style.display = 'flex';
        });
    }

    async function processPayment(method) {
        closeModal('payModal');
        const product = currentBuyProduct;
        const price = product.price;
        let finalPrice = price;
        if (product.discount) {
            finalPrice = product.discount.type === 'percent' ? price*(1 - product.discount.value/100) : price - product.discount.value;
        }
        finalPrice = Math.round(finalPrice);
        
        const order = {
            userId: currentUser.uid,
            userEmail: currentUser.email,
            productId: product.id,
            productTitle: product.title,
            price: finalPrice,
            originalPrice: price,
            method,
            status: method === 'crypto' ? 'wait_payment' : 'wait',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        try {
            const docRef = await db.collection('orders').add(order);
            const orderId = docRef.id;
            alert(`✅ Заказ #${orderId.slice(-6)} создан!`);

            if (method === 'crypto') {
                const response = await fetch(`https://pay.crypt.bot/api/createInvoice`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Crypto-Pay-API-Token': CRYPTOBOT_TOKEN },
                    body: JSON.stringify({
                        asset: 'USDT',
                        amount: finalPrice.toString(),
                        description: `Оплата заказа ${orderId.slice(-6)} - ${product.title}`,
                        hidden_message: `OrderID: ${orderId}`,
                        paid_btn_name: 'openChannel',
                        paid_btn_url: 'https://t.me/petboom_support'
                    })
                });
                const data = await response.json();
                if (data.ok) {
                    window.open(data.result.bot_invoice_url, '_blank');
                } else {
                    alert('Ошибка создания счета CryptoBot');
                }
            }
            renderUserOrders();
            if (currentUser.email === ADMIN_EMAIL) renderAdminOrders();
        } catch(e) { alert('Ошибка создания заказа: '+e); }
    }

    async function renderUserOrders() {
        const cont = document.getElementById('userOrdersContainer');
        if (!currentUser) { cont.innerHTML = '<p>Войдите для просмотра</p>'; return; }
        cont.innerHTML = '<p>Загрузка...</p>';
        const snap = await db.collection('orders').where('userId', '==', currentUser.uid).orderBy('createdAt', 'desc').get();
        cont.innerHTML = '';
        snap.forEach(doc => cont.appendChild(createOrderCard(doc.id, doc.data(), false)));
        if (snap.empty) cont.innerHTML = '<p>У вас пока нет заказов</p>';
    }

    async function renderAdminOrders() {
        const cont = document.getElementById('adminOrdersContainer');
        cont.innerHTML = '<p>Загрузка...</p>';
        const snap = await db.collection('orders').orderBy('createdAt', 'desc').get();
        cont.innerHTML = '';
        snap.forEach(doc => cont.appendChild(createOrderCard(doc.id, doc.data(), true)));
        if (snap.empty) cont.innerHTML = '<p>Нет заказов</p>';
    }

    function createOrderCard(orderId, o, isAdmin) {
        const div = document.createElement('div');
        div.className = 'order-card';
        let statusBadge = '';
        if (o.status === 'wait') statusBadge = '<span class="status-badge status-wait">Ожидает</span>';
        else if (o.status === 'done') statusBadge = '<span class="status-badge status-done">Выполнен</span>';
        else if (o.status === 'cancel') statusBadge = '<span class="status-badge status-cancel">Отменён</span>';
        else if (o.status === 'wait_payment') statusBadge = '<span class="status-badge status-paid">Ожидает оплаты</span>';
        
        const actions = isAdmin ? `
            <button class="action-btn" onclick="openChat('${orderId}', 'admin')">💬 Чат</button>
            ${o.status !== 'done' ? `<button class="action-btn" onclick="updateOrderStatus('${orderId}', 'done')">✔ Выполнить</button>` : ''}
            ${o.status !== 'cancel' ? `<button class="action-btn" onclick="updateOrderStatus('${orderId}', 'cancel')">✖ Отменить</button>` : ''}
        ` : `<button class="action-btn" onclick="openChat('${orderId}', 'user')">💬 Чат с поддержкой</button>`;
        
        div.innerHTML = `
            <div>
                <b>${o.productTitle}</b> · ${o.price}₽<br>
                ${o.userEmail} · ${o.method}<br>
                ${statusBadge}
            </div>
            <div class="order-actions">${actions}</div>
        `;
        return div;
    }

    async function updateOrderStatus(orderId, newStatus) {
        await db.collection('orders').doc(orderId).update({ status: newStatus });
        renderAdminOrders();
    }

    // --- ЧАТ ---
    function openChat(orderId, role) {
        currentChatOrderId = orderId;
        document.getElementById('chatOrderIdDisplay').innerText = orderId.slice(-6);
        const box = document.getElementById('chatMessagesBox');
        box.innerHTML = '<div class="chat-msg msg-system">Загрузка сообщений...</div>';
        document.getElementById('chatModal').style.display = 'flex';
        if (unsubscribeChat) unsubscribeChat();
        unsubscribeChat = db.collection('chats').doc(orderId).collection('messages').orderBy('timestamp').onSnapshot(snap => {
            box.innerHTML = '';
            if (snap.empty) box.innerHTML = '<div class="chat-msg msg-system">Начните общение</div>';
            snap.forEach(msgDoc => {
                const m = msgDoc.data();
                const cls = m.sender === 'admin' ? 'msg-admin' : (m.sender === 'system' ? 'msg-system' : 'msg-user');
                box.innerHTML += `<div class="chat-msg ${cls}"><b>${m.senderName || 'Система'}:</b> ${m.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    async function sendChatMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text || !currentChatOrderId) return;
        const sender = (currentUser.email === ADMIN_EMAIL) ? 'admin' : 'user';
        const senderName = sender === 'admin' ? 'Админ' : (currentUser.email.split('@')[0]);
        await db.collection('chats').doc(currentChatOrderId).collection('messages').add({
            text, sender, senderName, timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = '';
    }

    function stopChatListener() { if (unsubscribeChat) { unsubscribeChat(); unsubscribeChat = null; } }

    // Инициализация при загрузке
    window.onload = () => {
        if (currentUser) {
            renderProducts();
            renderUserOrders();
        }
    };
</script>
</body>
</html>
